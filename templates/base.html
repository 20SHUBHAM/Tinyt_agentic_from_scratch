<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Agentic AI Focus Group Platform{% endblock %}</title>
    
    <!-- Professional Business CSS -->
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary-color: #64748b;
            --success-color: #059669;
            --warning-color: #d97706;
            --error-color: #dc2626;
            --background-color: #f8fafc;
            --surface-color: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--background-color);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 2rem 0;
            box-shadow: var(--shadow-lg);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            transition: background-color 0.2s;
        }

        .nav-links a:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .nav-links a.active {
            background-color: rgba(255, 255, 255, 0.2);
        }

        /* Main Content */
        .main-content {
            padding: 3rem 0;
            min-height: calc(100vh - 200px);
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        .page-subtitle {
            font-size: 1.25rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Cards */
        .card {
            background: var(--surface-color);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }

        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .card-icon {
            width: 3rem;
            height: 3rem;
            background: var(--primary-color);
            color: white;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-right: 1rem;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Forms */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border-color);
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: var(--secondary-color);
            color: white;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .btn-success {
            background: var(--success-color);
            color: white;
        }

        .btn:disabled {
            background: #cbd5e1;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Status indicators */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .status-completed {
            background: #dcfce7;
            color: #166534;
        }

        .status-active {
            background: #fef3c7;
            color: #92400e;
        }

        .status-pending {
            background: #f1f5f9;
            color: var(--text-secondary);
        }

        /* Results */
        .result-container {
            margin-top: 2rem;
        }

        .result-success {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-left: 4px solid var(--success-color);
            border-radius: 0.5rem;
            padding: 1.5rem;
        }

        .result-error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-left: 4px solid var(--error-color);
            border-radius: 0.5rem;
            padding: 1.5rem;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .spinner {
            width: 2rem;
            height: 2rem;
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Progress indicator */
        .progress-steps {
            display: flex;
            justify-content: center;
            margin: 2rem 0;
            gap: 1rem;
        }

        .progress-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .progress-circle {
            width: 3rem;
            height: 3rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            border: 2px solid var(--border-color);
            background: var(--surface-color);
        }

        .progress-circle.completed {
            background: var(--success-color);
            color: white;
            border-color: var(--success-color);
        }

        .progress-circle.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .progress-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-align: center;
        }

        /* Footer */
        .footer {
            background: var(--surface-color);
            border-top: 1px solid var(--border-color);
            padding: 2rem 0;
            text-align: center;
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            .nav-links {
                gap: 1rem;
            }

            .page-title {
                font-size: 2rem;
            }

            .card {
                padding: 1.5rem;
            }

            .progress-steps {
                flex-wrap: wrap;
                gap: 0.5rem;
            }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--background-color);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--secondary-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    🤖 Agentic AI Research Platform
                </div>
                <nav>
                    <ul class="nav-links">
                        <li><a href="/" class="{% if request.endpoint == 'index' %}active{% endif %}">Dashboard</a></li>
                        <li><a href="/personas" class="{% if request.endpoint == 'personas' %}active{% endif %}">Personas</a></li>
                        <li><a href="/discussion" class="{% if request.endpoint == 'discussion' %}active{% endif %}">Discussion</a></li>
                        <li><a href="/analysis" class="{% if request.endpoint == 'analysis' %}active{% endif %}">Analysis</a></li>
                        <li><a href="/results" class="{% if request.endpoint == 'results' %}active{% endif %}">Results</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Agentic AI Research Platform. Powered by advanced AI agents and TinyTroupe.</p>
        </div>
    </footer>

    <!-- Global JavaScript -->
    <script>
        // Global utilities
        function showLoading(elementId, message = 'Processing...') {
            const element = document.getElementById(elementId);
            if (element) {
                element.innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <span>🤖 ${message}</span>
                    </div>
                `;
            }
        }

        function showSuccess(elementId, content) {
            const element = document.getElementById(elementId);
            if (element) {
                element.innerHTML = `
                    <div class="result-success">
                        ${content}
                    </div>
                `;
            }
        }

        function showError(elementId, error) {
            const element = document.getElementById(elementId);
            if (element) {
                element.innerHTML = `
                    <div class="result-error">
                        <strong>Error:</strong> ${error}
                    </div>
                `;
            }
        }

        async function apiCall(endpoint, data = {}) {
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return await response.json();
            } catch (error) {
                return { success: false, error: error.message };
            }
        }

        // Session management
        let sessionData = JSON.parse(localStorage.getItem('sessionData') || '{}');

        function saveSessionData(data) {
            sessionData = { ...sessionData, ...data };
            localStorage.setItem('sessionData', JSON.stringify(sessionData));
        }

        function getSessionData() {
            return sessionData;
        }

        function clearSessionData() {
            sessionData = {};
            localStorage.removeItem('sessionData');
        }

        // Navigation helpers
        function navigateToStep(step) {
            const routes = {
                'personas': '/personas',
                'discussion': '/discussion', 
                'analysis': '/analysis',
                'results': '/results'
            };
            
            if (routes[step]) {
                window.location.href = routes[step];
            }
        }

        // Initialize session on page load
        window.addEventListener('DOMContentLoaded', function() {
            // Check if we have an active session
            if (!sessionData.session_id) {
                initializeSession();
            }
        });

        async function initializeSession() {
            const result = await apiCall('/api/start-session');
            if (result.success) {
                saveSessionData({ session_id: result.session_id });
            }
        }
    </script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
